      function parseGoogleMapsPlace(value) {
        const input = String(value || "").trim();
        const verifiedUrlMatch = input.match(/Google Mapsпј?\S+)/);
        const source = verifiedUrlMatch ? verifiedUrlMatch[1].trim() : input;
        let url;
        try {
          url = new URL(source);
        } catch {
          return null;
        }
        if (!/google\.[^/]+\/maps|maps\.app\.goo\.gl/.test(url.hostname + url.pathname)) return null;
        if (url.hostname.includes("maps.app.goo.gl")) return null;

        const decodedPath = decodeURIComponent(url.pathname.replace(/\+/g, " "));
        const placeMatch = decodedPath.match(/\/place\/([^/]+)/);
        const verifiedNameMatch = input.match(/?°й?пј?[^пҪң\n]+)/);
        const rawName = verifiedNameMatch ? verifiedNameMatch[1].trim() : placeMatch ? placeMatch[1].trim() : "";
        const name = rawName || "Google Maps ?°й?";
        const verifiedCoordsMatch = input.match(/еә§ж?пјҡ\s*(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
        const preciseMatch = source.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
        const atMatch = source.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
        const coords = verifiedCoordsMatch || preciseMatch || atMatch;
        if (!coords) return null;

        return {
          name,
          url: source,
          lat: coords[1],
          lng: coords[2],
        };
      }

      function verifyMeetingPlace() {

            lng: document.getElementById("meetingLng").value,

          setMeetingPlaceButtonVerified(true);
          setPlaceStatus("");

        }
        const field = document.getElementById("meetingArea");
        const parsed = parseGoogleMapsPlace(field.value);
        if (!parsed) {
          clearMeetingPlaceFields();
          setMeetingPlaceButtonInvalid(true);
          setPlaceStatus("и«ӢиІјдёҠе???Google Maps ?°й?з¶Іе?еҫҢж??Ңй?иӯүгҖҚгҖ?, "error");
          showToast("и«ӢиІјдёҠе???Google Maps ?°й?з¶Іе?");
          return false;
        }
        setFieldValue("meetingPlaceName", parsed.name);
        setFieldValue("meetingPlaceUrl", parsed.url);
        setFieldValue("meetingLat", parsed.lat);
        setFieldValue("meetingLng", parsed.lng);
        field.value = formatVerifiedMeetingPlace(parsed);
        setPlaceStatus("");
        setMeetingPlaceButtonVerified(true);
        showToast("?°й?й©—и??җе?");
        scheduleProfileDraftSave();
        return true;
      }

      }

      function padTimePart(value) {
        return String(value).padStart(2, "0");
      }

      function toDateTimeLocalValue(date) {
        return date.getFullYear() + "-" + padTimePart(date.getMonth() + 1) + "-" + padTimePart(date.getDate()) + "T" + padTimePart(date.getHours()) + ":" + padTimePart(date.getMinutes());
      }

      function formatInviteTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.getFullYear() + "/" + padTimePart(date.getMonth() + 1) + "/" + padTimePart(date.getDate()) + " " + padTimePart(date.getHours()) + ":" + padTimePart(date.getMinutes());
      }

      function weekdayLabel(value) {
        return ["?ұж—Ҙ", "?ұд?", "?ұд?", "?ұд?", "?ұе?", "?ұд?", "?ұе…ӯ"][value] || "";
      }

      function availabilityPeriod(start) {
        const hour = Number(String(start).slice(0, 2));
        if (hour < 12) return "дёҠе? 09:00-12:00";
        if (hour < 15) return "?Ҳе? 12:00-15:00";
        if (hour < 18) return "?Қж? 15:00-18:00";
        return "?ҡд? 18:00-21:00";
      }

      function availabilityLabels(candidate) {
        const ranges = candidate.availableRanges || labelToTimeRanges(candidate.time);
        const labels = ranges.map((range) => `${weekdayLabel(range.weekday)} ${availabilityPeriod(range.start)}`);
        return Array.from(new Set(labels.length ? labels : [candidate.time || "е°ҡжңӘеЎ«еҜ«"]));
      }

      function normalizeInviteTimeValue(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        const roundedMinutes = date.getMinutes() < 15 ? 0 : date.getMinutes() < 45 ? 30 : 60;
        if (roundedMinutes === 60) {
          date.setHours(date.getHours() + 1, 0, 0, 0);
        } else {
          date.setMinutes(roundedMinutes, 0, 0);
        }
        return toDateTimeLocalValue(date);
      }

      function nextWeekdayDate(weekday, hour) {
        const date = new Date();
        const diff = (weekday - date.getDay() + 7) % 7 || 7;
        date.setDate(date.getDate() + diff);
        date.setHours(hour, 0, 0, 0);
        return date;
      }

      function labelToTimeRanges(label) {
        const rules = {
          "е№іж—Ҙ?ҡд?": [
            { weekday: 1, start: "18:00", end: "21:00" },
            { weekday: 3, start: "18:00", end: "21:00" },
            { weekday: 5, start: "18:00", end: "21:00" },
          ],
          "?ұе…ӯдёҠе?": [{ weekday: 6, start: "09:00", end: "12:00" }],
          "?ұе…ӯдёӢе?": [{ weekday: 6, start: "12:00", end: "18:00" }],
          "?ұж—ҘдёӢе?": [{ weekday: 0, start: "12:00", end: "18:00" }],
          "?ұж—Ҙ?ҡд?": [{ weekday: 0, start: "18:00", end: "21:00" }],
          "?ұж—ҘдёҠе?": [{ weekday: 0, start: "09:00", end: "12:00" }],
        };
        return rules[label] || [{ weekday: 6, start: "12:00", end: "18:00" }];
      }

      function parseTimeParts(value) {
        const [hour, minute] = value.split(":").map(Number);
        return { hour, minute };
      }

      function nextWeekdayDate(weekday, hour, minute = 0) {
        const date = new Date();
        const diff = (weekday - date.getDay() + 7) % 7 || 7;
        date.setDate(date.getDate() + diff);
        date.setHours(hour, minute, 0, 0);
        return date;
      }

      function weekStartDate() {
        const date = new Date();
        date.setHours(0, 0, 0, 0);
        return date;
      }

      function dateMatchesRange(date, range) {
        if (date.getDay() !== range.weekday) return false;
        const start = parseTimeParts(range.start);
        const end = parseTimeParts(range.end);
        const minutes = date.getHours() * 60 + date.getMinutes();
        const startMinutes = start.hour * 60 + start.minute;
        const endMinutes = end.hour * 60 + end.minute;
        return minutes >= startMinutes && minutes <= endMinutes;
      }

      function buildInviteWeekDays() {
        const today = weekStartDate();
        return Array.from({ length: 7 }, (_, index) => {
          const date = new Date(today);
          date.setDate(today.getDate() + index);
          return date;
        });
      }

          { key: "night", label: "?ҡд?", start: "18:00", end: "21:00" },
        ];
      }

      function minutesFromTime(value) {
        const { hour, minute } = parseTimeParts(value);
        return hour * 60 + minute;
      }

      function rangeOverlapsPeriod(range, period) {
        const rangeStart = minutesFromTime(range.start);
        const rangeEnd = minutesFromTime(range.end);
        const periodStart = minutesFromTime(period.start);
        const periodEnd = minutesFromTime(period.end);
        return rangeStart < periodEnd && rangeEnd > periodStart;
      }

      function preciseInviteTimeOptions(invite, candidate) {
        return inviteTimeOptions(invite, candidate).flatMap((option) => {
          const match = option.match(/^(.*?)(\d{2}:\d{2})-(\d{2}:\d{2})$/);
          if (!match) return [option];
          const prefix = match[1].replace(/\s*(дёҠе?|?Ҳе?|?Қж?|?ҡд?)\s*$/, "").trim();
          const start = minutesFromTime(match[2]);
          const end = minutesFromTime(match[3]);
          const slots = [];
          for (let minute = start; minute + 60 <= end; minute += 60) {
            slots.push(`${prefix} ${formatMinutesAsTime(minute)}-${formatMinutesAsTime(minute + 60)}`.trim());
          }
          return slots.length ? slots : [option];
        });

        if (invite.status === "sent") return `${viewButton}${profileButton}`;

      function normalizeInviteStatus(status) {
        const normalized = String(status || "").trim().toLowerCase();
        if (["accepted", "scheduled", "ready", "confirmed", "е·ІзўәиӘ?, "еҫ…и???].includes(normalized)) return "confirmed";
        if (["completed", "complete", "done", "е·Іе???].includes(normalized)) return "done";
        if (["canceled", "cancelled", "е·Іе?ж¶?].includes(normalized)) return "cancelled";
        if (["pending", "sent", "е·Ій?зҙ?].includes(normalized)) return "sent";
        if (["incoming", "иў«й?зҙ?].includes(normalized)) return "incoming";
        return normalized || "sent";
      }

      function inviteUserId(invite, keys) {
        for (const key of keys) {
          if (invite[key]) return String(invite[key]).trim();
        }
        return "";
      }

      function inviteForCurrentUser(invite) {
        if (!state.currentUser?.userId) return null;
        const currentUserId = String(state.currentUser.userId).trim();
        const senderId = inviteUserId(invite, ["senderUserId", "sender_user_id", "senderId", "sender_id"]);
        const receiverId = inviteUserId(invite, ["receiverUserId", "receiver_user_id", "receiverId", "receiver_id"]);
        const baseStatus = normalizeInviteStatus(invite.status);

        if (senderId || receiverId) {
          const isSender = senderId === currentUserId;
          const isReceiver = receiverId === currentUserId;
          if (!isSender && !isReceiver) return null;
          return {
            ...invite,
            candidateId: isSender ? receiverId : senderId,
            status: baseStatus === "sent" && isReceiver ? "incoming" : baseStatus,
          };
        }

        if (!hasRemoteApi() && invite.candidateId) return { ...invite, status: baseStatus };
        return null;
      }

      function normalizeSheetPhotoPath(photoPath) {
        if (!photoPath) return "";

        return {
          ...invite,
          id: invite.id || invite.invite_id || `sheet-invite-${index + 1}`,
          candidateId: invite.candidateId || invite.candidate_id || "",
          senderUserId: invite.senderUserId || invite.sender_user_id || invite.senderId || "",
          receiverUserId: invite.receiverUserId || invite.receiver_user_id || invite.receiverId || "",
          status: normalizeInviteStatus(invite.status),
        };
      }

      function profilePhotos(user) {
        return [user.photo, ...(user.photos || [])]
          .map(normalizeSheetPhotoPath)
          .filter(Boolean)
          .filter((photo, index, photos) => photos.indexOf(photo) === index)
          .slice(0, 5);
      }

      async function loadSheetAppData(silent = false) {
        if (!hasRemoteApi()) return;
        try {
          const response = await fetch(apiEndpoint("app-data"));
          const data = await response.json();
          if (!response.ok || !data.ok) throw new Error(data.error || "и®Җ?–и©Ұз®—иЎЁеӨұж?");
          if (Array.isArray(data.candidates) && data.candidates.length) {
            candidates.splice(
              0,
              candidates.length,
              ...data.candidates.map((candidate) => ({
                ...candidate,
                photo: normalizeSheetPhotoPath(candidate.photo),
                photos: (candidate.photos || []).map(normalizeSheetPhotoPath),
              })),
            );
          }
          if (Array.isArray(data.invites)) {
            invites.splice(0, invites.length, ...data.invites.map(normalizeSheetInvite));
          }
          if (!silent) showToast("е·Іи??Ҙи©Ұз®—иЎЁиіҮж?");
        } catch (error) {
          console.warn("дҪҝз”Ё?§е»әзӨәз?иіҮж?пј?, error);
        }
      }

      document.getElementById("verifyMeetingPlace").addEventListener("click", verifyMeetingPlace);
      document.getElementById("profileForm").addEventListener("input", () => {
        updateMapLinks();
        scheduleProfileDraftSave();
      });
      document.getElementById("profileForm").addEventListener("change", scheduleProfileDraftSave);
      document.getElementById("profileForm").addEventListener("click", (event) => {
        const button = event.target.closest("[data-time-choice]");
        if (!button) return;
        button.classList.toggle("active");
        updateAvailabilityNoteFromChoices();
        scheduleProfileDraftSave();
      });

      document.getElementById("interestWorlds").addEventListener("click", (event) => {
        const button = event.target.closest("[data-interest-keyword]");
        if (!button) return;
        button.classList.toggle("active");
        syncInterestKeywords();
        scheduleProfileDraftSave();
      });

      document.getElementById("profileForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!verifyMeetingPlace()) return;
        syncInterestKeywords();
        state.profile = formToObject(event.currentTarget);
        saveStoredPhotos(state.profile.email);
        saveProfileDraft();
        let savedToCloud = false;
        try {
          if (!hasRemoteApi()) throw new Error("е°ҡжңӘиЁӯе? Google Apps Script URL");
          const response = await fetch(apiEndpoint("users"), {
            method: "POST",
            headers: { "content-type": "text/plain;charset=utf-8" },
            body: JSON.stringify(state.profile),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) throw new Error(data.error || "?Іе?еӨұж?");
          state.currentUser = {
            userId: data.userId,
            email: state.profile.email,
            name: state.profile.nickname || state.profile.email,
            gender: state.profile.gender,
            reviewStatus: data.created ? "е·Іе»әз«Ӣи??? : "е·Ізҷ»??,
          };
          renderLoginPanel();
          updateAdminVisibility();
          await loadSheetAppData();
          renderCandidates();
          renderInvites();
          clearProfileDraft(state.profile.email);
          savedToCloud = true;
        } catch (error) {
          console.warn("дҪҝз”Ё?…и??ҷжҡ«еӯҳж–ј?¬ж?пј?, error);
          state.currentUser = {
            userId: "local-user",
            email: state.profile.email,
            name: state.profile.nickname || state.profile.email || "?°ж???,
            gender: state.profile.gender,
            reviewStatus: "?¬ж??«е?",
          };
          renderLoginPanel();
          updateAdminVisibility();
        }
        updateSummary();
        showToast(savedToCloud ? "?Іе??җе?" : "иіҮж?е·Іжҡ«еӯҳеңЁ?¬ж?пјҢйӣІз«Ҝе??Әе??җе„Іеӯ?);
        go("digest");
      });

      document.getElementById("emailTabs").addEventListener("click", (event) => {
        const button = event.target.closest("[data-email-filter]");
        if (!button) return;
        document.querySelectorAll("[data-email-filter]").forEach((tab) => {
          tab.classList.toggle("active", tab === button);
        });
        document.querySelectorAll("[data-email-template]").forEach((template) => {
          template.classList.toggle("hidden", template.dataset.emailTemplate !== button.dataset.emailFilter);
        });
      });

      document.getElementById("testSheetsConnection").addEventListener("click", async () => {
        const result = document.getElementById("sheetsConnectionResult");
        if (!hasRemoteApi()) {
          result.textContent = "GitHub Pages жЁЎе?пјҡе??ӘиЁӯе®?Google Apps Script URLпјҢж??ҲдҪҝ?Ёе…§е»әзӨәзҜ„и??ҷгҖ?;
          return;
        }
        result.textContent = "???дё?..";
        try {
          const response = await fetch(apiEndpoint("sheets"));
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "???еӨұж?");
          }
          result.textContent = `????җе?пј?{data.title}пј?{data.sheets.join("??)}пјү`;
        } catch (error) {
          result.textContent = `???еӨұж?пјҡи?зўәи?е·Іеҹ·иЎ?node server.js??{error.message}`;
        }
      });

      function renderPhotoGrid() {
        const grid = document.getElementById("photoGrid");
        grid.innerHTML = Array.from({ length: 5 })
          .map((_, index) => {
            const src = state.photos[index];
            const mainClass = index === 0 ? " main" : "";
            const label = index === 0 ? "дё»з…§?? : `${index + 1}`;
            return `<div class="photo-slot${mainClass}">${
              src
                ? `<img alt="?§з? ${index + 1}" src="${src}" /><button class="photo-remove" type="button" data-remove-photo="${index}" aria-label="?ӘйҷӨ?§з?">?</button>`
                : label
            }</div>`;
          })
          .join("");
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(file);
        });
      }

      document.getElementById("photoInput").addEventListener("change", async (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;
        const remainingSlots = 5 - state.photos.length;
        const selected = files.slice(0, Math.max(remainingSlots, 0));
        if (!selected.length) {
          showToast("?ҖеӨҡеҸӘ?Ҫж”ҫ 5 ејөз…§??);
          return;
        }
        const urls = await Promise.all(selected.map(readFileAsDataUrl));
        state.photos = state.photos.concat(urls).slice(0, 5);
        saveStoredPhotos(state.currentUser?.email || document.getElementById("email").value);
        renderPhotoGrid();
        updateSummary();
        scheduleProfileDraftSave();
        showToast(files.length > selected.length ? "е·ІеҢҜ?Ҙе? 5 ејөз…§?? : "?§з?е·ІеҢҜ??);
        event.target.value = "";
      });

      document.getElementById("photoGrid").addEventListener("click", (event) => {
        const button = event.target.closest("[data-remove-photo]");
        if (!button) return;
        state.photos.splice(Number(button.dataset.removePhoto), 1);
        saveStoredPhotos(state.currentUser?.email || document.getElementById("email").value);
        renderPhotoGrid();
        updateSummary();
        scheduleProfileDraftSave();
        showToast("?§з?е·ІеҲӘ??);
      });

      window.addEventListener("beforeunload", (event) => {
        if (!state.profileDirty) return;
        event.preventDefault();
        event.returnValue = "дҪ ж?е°ҡжңӘ?Іе??„дҝ®?№п?зўәе?иҰҒйӣў?Ӣе?пј?;
      });

      document.getElementById("candidateGrid").addEventListener("click", (event) => {
        const button = event.target.closest("[data-invite]");
        if (button) {
          openInviteModal(button.dataset.invite);
          return;
        }
        const card = event.target.closest("[data-candidate-card]");
        if (!card) return;
        toggleCandidateDetail(card.dataset.candidateCard, card);
      });

      document.getElementById("candidateDetail").addEventListener("click", (event) => {
        if (event.target.closest("[data-close-detail='candidate']")) {
          closeCandidateDetail();
          return;
        }
        const photoButton = event.target.closest("[data-photo-step]");
        if (photoButton) {
          const panel = document.getElementById("candidateDetail");
          const currentCard = panel.previousElementSibling?.classList.contains("candidate-card") ? panel.previousElementSibling : null;
          renderCandidateDetail(
            panel.dataset.candidateId,
            currentCard,
            Number(panel.dataset.photoIndex || 0) + Number(photoButton.dataset.photoStep),
          );
          return;
        }
        const button = event.target.closest("[data-invite]");
        if (!button) return;
        openInviteModal(button.dataset.invite);
      });

      document.getElementById("inviteModal").addEventListener("click", (event) => {
        if (event.target.id === "inviteModal" || event.target.closest("[data-close-invite-modal]")) {
          closeInviteModal();
        }
      });

      document.getElementById("confirmInviteButton").addEventListener("click", confirmInvite);
      document.getElementById("invitePlace").addEventListener("input", updateInvitePlaceMapLink);
      document.getElementById("quickTimeChoices").addEventListener("click", (event) => {
        const button = event.target.closest(".time-grid-slot.is-available") || event.target.closest(".quick-time-button");
        if (!button) return;
        button.classList.toggle("is-selected");
        updateSelectedInviteTimeSummary();
      });

      const loginPanel = document.getElementById("loginPanel");
      if (loginPanel) {
        loginPanel.addEventListener("submit", async (event) => {
          if (!event.target.matches("#loginForm")) return;
          event.preventDefault();
          const data = formToObject(event.target);
          await loginWithEmail(data.email);
        });
        loginPanel.addEventListener("click", (event) => {
          const toggle = event.target.closest("[data-toggle-user-menu]");
          if (toggle) {
            loginPanel.querySelector("[data-user-menu-panel]")?.classList.toggle("hidden");
            return;
          }
          if (event.target.closest("[data-logout]")) {
            logoutCurrentUser();
          }
        });
      }

      const homeLoginButton = document.getElementById("homeLoginButton");
      const homeLoginEmail = document.getElementById("homeLoginEmail");
      if (homeLoginButton && homeLoginEmail) {
        const submitHomeLogin = async () => {
          const email = homeLoginEmail.value.trim();
          if (!email) {
            showToast("и«Ӣе?ијёе…Ҙ Email");
            homeLoginEmail.focus();
            return;
          }
          homeLoginButton.disabled = true;
          try {
            await loginWithEmail(email);
          } finally {
            homeLoginButton.disabled = false;
          }
        };
        homeLoginButton.addEventListener("click", submitHomeLogin);
        homeLoginEmail.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;
          event.preventDefault();
          submitHomeLogin();
        });
      }

      document.getElementById("inviteList").addEventListener("click", (event) => {
        const cancelButton = event.target.closest("[data-cancel-invite]");
        if (cancelButton) {
          cancelInvite(cancelButton.dataset.cancelInvite);
          return;
        }
        const acceptButton = event.target.closest("[data-accept-invite]");
        if (acceptButton) {
          acceptInvite(acceptButton.dataset.acceptInvite);
          return;
        }
        const viewButton = event.target.closest("[data-view-invite]");
        if (viewButton) {
          renderInviteDetail(viewButton.dataset.viewInvite, viewButton.closest(".invite-card"));
          return;
        }
        const candidateButton = event.target.closest("[data-view-candidate]");
        if (candidateButton) {
          openCandidateFromInvite(candidateButton.dataset.viewCandidate);
          return;
        }
        const card = event.target.closest("[data-invite-card]");
        if (!card) return;
        toggleInviteDetail(card.dataset.inviteCard, card);
      });

      document.getElementById("inviteDetail").addEventListener("click", (event) => {
        if (event.target.closest("[data-close-detail='invite']")) {
          closeInviteDetail();
          return;
        }
        const timeButton = event.target.closest("[data-incoming-time]");
        if (timeButton) {
          const panel = document.getElementById("inviteDetail");
          const inviteId = panel.dataset.inviteId;
          state.selectedIncomingTimes[inviteId] = timeButton.dataset.incomingTime;
          renderInviteDetail(inviteId, panel.previousElementSibling?.classList.contains("invite-card") ? panel.previousElementSibling : null);
          return;
        }
        const photoButton = event.target.closest("[data-invite-photo-step]");
        if (photoButton) {
          const panel = document.getElementById("inviteDetail");
          const inviteId = panel.dataset.inviteId;
          const currentCard = panel.previousElementSibling?.classList.contains("invite-card") ? panel.previousElementSibling : null;
          panel.dataset.photoIndex = Number(panel.dataset.photoIndex || 0) + Number(photoButton.dataset.invitePhotoStep);
          renderInviteDetail(inviteId, currentCard);
          return;
        }
        const cancelButton = event.target.closest("[data-cancel-invite]");
        if (cancelButton) cancelInvite(cancelButton.dataset.cancelInvite);
        const acceptButton = event.target.closest("[data-accept-invite]");
        if (acceptButton) acceptInvite(acceptButton.dataset.acceptInvite);
        const viewButton = event.target.closest("[data-view-invite]");
        if (viewButton) renderInviteDetail(viewButton.dataset.viewInvite);
        const candidateButton = event.target.closest("[data-view-candidate]");
        if (candidateButton) openCandidateFromInvite(candidateButton.dataset.viewCandidate);
      });

      document.getElementById("inviteTabs").addEventListener("click", (event) => {
        const button = event.target.closest("[data-invite-filter]");
        if (!button) return;
        state.inviteFilter = button.dataset.inviteFilter;
        document.querySelectorAll("[data-invite-filter]").forEach((tab) => {
          tab.classList.toggle("active", tab === button);
        });
        renderInvites();
      });

      bootstrapApp();
    </script>
  </body>
</html>
